{{define "vantage/live_logs"}}
<div class="glass-card rounded-lg border border-vantage-border overflow-hidden shadow-2xl shadow-black/40">
    <div class="bg-vantage-sidebar/80 px-8 py-5 border-b border-vantage-border flex justify-between items-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-px bg-gradient-to-r from-transparent via-vantage-accent/30 to-transparent"></div>
        <div class="flex items-center gap-4">
            <div class="flex gap-2">
                <div class="w-3.5 h-3.5 rounded-full bg-red-500/60 border border-red-500/20"></div>
                <div class="w-3.5 h-3.5 rounded-full bg-yellow-500/60 border border-yellow-500/20"></div>
                <div class="w-3.5 h-3.5 rounded-full bg-green-500/60 border border-green-500/20"></div>
            </div>
            <h4 class="font-mono text-sm font-black ml-2 tracking-widest text-vantage-text/80 uppercase italic">Sector Surveillance Feed</h4>
        </div>
        <span class="px-4 py-1.5 rounded-lg text-xs bg-red-900/30 text-red-400 border border-red-500/30 font-black uppercase tracking-widest animate-pulse shadow-[0_0_15px_rgba(239,68,68,0.2)]" id="scanner-status" style="display:none;">LIVE ENGAGEMENT</span>
    </div>
    <div class="h-[450px] overflow-y-auto bg-black/95 p-8 space-y-2 font-mono text-sm border-t border-vantage-border/10 custom-scrollbar" id="scanner-logs" style="box-shadow: inset 0 0 50px rgba(0,0,0,0.9);">
        <p class="terminal-line text-vantage-accent font-black opacity-80 uppercase tracking-tighter shadow-sm shadow-vantage-accent/5 italic">[OPERATIONAL] Waiting for deployment sequence...</p>
    </div>
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #0a0a0a; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 4px; border: 2px solid #0a0a0a; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #2f2f2f; }
</style>
{{end}}
